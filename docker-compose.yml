services:
  backend:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: tindeuro-backend
    restart: unless-stopped
    environment:
      PORT: "8787"
      DB_PATH: "/data/decks.sqlite"
      FRONT_ORIGIN: "https://tindeuro.yoanpouzet.fr"
    volumes:
      - tindeuro-data:/data
    ports:
      - "8787:8787"

volumes:
  tindeuro-data:
